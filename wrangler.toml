# Wrangler config — deploys the static `dist/` folder as a Cloudflare Worker
# with Static Assets (the new unified Workers + Pages model).
#
# This config is "assets-only": no JS handler, just serves the static site.
# Cloudflare runs `npm run build` (produces dist/) then `npx wrangler deploy`
# (uploads dist/ to the global edge network).

name = "virida-vegan-pet-directory"
compatibility_date = "2026-05-15"

# Static assets configuration — required for static sites.
[assets]
directory = "./dist"
not_found_handling = "404-page"
